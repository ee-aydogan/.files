# Main mpv options
background-color='#1e1e2e'
osd-back-color='#11111b'
osd-border-color='#11111b'
osd-color='#cdd6f4'
osd-shadow-color='#1e1e2e'

# Stats script options
# Options are on separate lines for clarity
# Colors are in #BBGGRR format
script-opts-append=stats-border_color=251818
script-opts-append=stats-font_color=f4d6cd
script-opts-append=stats-plot_bg_border_color=fab489
script-opts-append=stats-plot_bg_color=251818
script-opts-append=stats-plot_color=fab489

# External script options
# It is fine to leave these here even if one does not use these scripts because they are just ignored unless a script uses them

# UOSC options
script-opts-append=uosc-color=foreground=89b4fa,foreground_text=313244,background=1e1e2e,background_text=cdd6f4,curtain=181825,success=a6e3a1,error=f38ba8

# --- Video ---
profile=gpu-hq            # high quality scaling
gpu-api=vulkan            # best on AMD (or opengl)
hwdec=vaapi               # hardware decoding (AMD on Linux)
hwdec-codecs=all

# --- Scaling ---
scale=ewa_lanczos         # high quality upscale
dscale=mitchell           # downscale
cscale=ewa_lanczos        # chroma scale

# --- Audio ---
volume=100
volume-max=150            # allow boosting above 100%
audio-file-auto=fuzzy     # auto-load external audio tracks
alang=tr,en               # preferred audio language

# --- Subtitles ---
slang=tr,en               # preferred subtitle language
sub-auto=fuzzy            # fuzzy subtitle file matching
sub-font="JetBrains Mono"
sub-font-size=42
sub-border-size=2
sub-color="#FFFFFFFF"
sub-border-color="#000000"
sub-shadow-offset=1

# --- Behavior ---
save-position-on-quit     # resume where you left off
keep-open=yes             # don't close when video ends
autofit=85%               # window size relative to screen
cursor-autohide=1000      # hide cursor after 1s
screenshot-directory=~/Pictures/mpv
screenshot-format=png
